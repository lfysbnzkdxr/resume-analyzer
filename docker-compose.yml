services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "src.core.healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
